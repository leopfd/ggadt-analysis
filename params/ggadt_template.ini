# GGADT parameter template
#
# Use this as a starting point, then copy to your own run file and edit.
# Example:
#   cp params/ggadt_template.ini params/a_MgFeSiO4_examples/my_run.ini
#
# Notes:
# - Keep only one optical-constants strategy active:
#     (A) material-file
#     (B) ior-re + ior-im
#     (C) material-file1..3 + material-tag1..3 (+ agglom-composition-file)
# - Choose one run mode:
#     integrated = T  -> energy sweep (ephot-min/max + nephots or dephot)
#     integrated = F  -> single energy run (ephot)

# ------------------------------
# Core run settings (common)
# ------------------------------
grain-geometry                 = 'ellipsoid'      # sphere | ellipsoid | spheres | agglomeration | custom
verbose                        = F
use-efficiencies               = T
integrated                     = T
do-full-2d-fft                 = F

# ------------------------------
# Shape / size / grid (common)
# ------------------------------
aeff                           = 0.10             # microns
ngrain                         = 128
grain-axis-x                   = 1.0              # used for ellipsoid
grain-axis-y                   = 1.0              # used for ellipsoid
grain-axis-z                   = 2.0              # used for ellipsoid

# Agglomerate geometry (enable for grain-geometry='spheres')
# agglom-file                  = '/absolute/path/to/cluster.targ'

# ------------------------------
# Optical constants (choose one strategy)
# ------------------------------
# Strategy A: material table (recommended)
material-file                  = '/absolute/path/to/material_file.dat'

# Strategy B: fixed m-1 at one energy (disable material-file above if using this)
# ior-re                       = -1.920E-4
# ior-im                       =  2.807E-5

# Strategy C: multi-material agglomerate (disable material-file above)
# material-file1               = '/absolute/path/to/silicate.dat'
# material-tag1                = 'sil'
# material-file2               = '/absolute/path/to/carbon.dat'
# material-tag2                = 'carb'
# material-file3               = '/absolute/path/to/ice.dat'
# material-tag3                = 'ice'
# agglom-composition-file      = '/absolute/path/to/cluster.comp'

# ------------------------------
# Energy sampling
# ------------------------------
# Integrated mode (integrated = T)
ephot-min                      = 0.400            # keV
ephot-max                      = 0.562            # keV
nephots                        = 201
# dephot                       = 0.001            # alternative to nephots

# Differential mode (integrated = F)
# ephot                        = 0.530            # keV

# ------------------------------
# Angular/orientation sampling (commonly tuned)
# ------------------------------
dtheta                         = 25.0             # arcsec
max-angle                      = 6000.0           # arcsec
angle-mode                     = 'random'         # random | sequential | file
norientations                  = 32

# If using angle-mode='file'
# angle-file                   = '/absolute/path/to/orientations.txt'
# axes-convention              = 'ddscat'         # ddscat | mstm

# ------------------------------
# Optional performance/output knobs
# ------------------------------
# nthreads                     = -1               # OpenMP threads
# output-sigfigs               = 8
# quiet                        = F
# timing                       = F
# force-numerical              = F               # for sphere geometry
# fftw-optimization            = 'estimate'      # estimate | measure | patient | exhaustive
# use-padded-fft               = F

# ------------------------------
# Optional 2D/phi-averaged controls
# ------------------------------
# do-full-2d-fft               = T
# do-phi-averaging             = T               # requires do-full-2d-fft=T and integrated=F
# nphi                         = 180
# nscatter                     = 401

# ------------------------------
# Optional unit overrides
# ------------------------------
# units-file                   = '/absolute/path/to/units.txt'
# input-unit-length            = 'micron'
# input-unit-angle             = 'arcsecond'
# input-unit-energy            = 'keV'
# output-unit-length           = 'micron'
# output-unit-angle            = 'arcsecond'
# output-unit-energy           = 'keV'

# ------------------------------
# Optional file outputs
# ------------------------------
# save-shadow-function         = T
# save-file-root               = 'my_run'
# save-orientations            = T
