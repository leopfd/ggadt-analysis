# GGADT parameter template
# Copy to a run file and edit.
# REQUIRED means needed for a complete run.
# Keep one optical strategy active.
# Choose one run mode:
#   integrated = T  -> energy sweep
#   integrated = F  -> single energy

# ------------------------------
# Core run settings (common)
# ------------------------------
grain-geometry                 = 'ellipsoid'      # REQUIRED
integrated                     = T                # REQUIRED
verbose                        = F
use-efficiencies               = T
do-full-2d-fft                 = F

# ------------------------------
# Shape / size / grid (common)
# ------------------------------
aeff                           = 0.10             # REQUIRED
ngrain                         = 128              # REQUIRED
grain-axis-x                   = 1.0              # REQUIRED for ellipsoid
grain-axis-y                   = 1.0              # REQUIRED for ellipsoid
grain-axis-z                   = 2.0              # REQUIRED for ellipsoid

# REQUIRED for spheres/agglomeration
# agglom-file                  = '/absolute/path/to/cluster.targ'

# ------------------------------
# Optical constants (choose one strategy)
# ------------------------------
# Choose exactly one strategy.
material-file                  = '/absolute/path/to/material_file.dat'  # REQUIRED for material table

# REQUIRED pair for fixed m-1
# ior-re                       = -1.920E-4
# ior-im                       =  2.807E-5

# REQUIRED set for multi-material agglomerates
# material-file1               = '/absolute/path/to/silicate.dat'
# material-tag1                = 'sil'
# material-file2               = '/absolute/path/to/carbon.dat'
# material-tag2                = 'carb'
# material-file3               = '/absolute/path/to/ice.dat'
# material-tag3                = 'ice'
# agglom-composition-file      = '/absolute/path/to/cluster.comp'

# ------------------------------
# Energy sampling
# ------------------------------
# REQUIRED for integrated = T
ephot-min                      = 0.400            # REQUIRED
ephot-max                      = 0.562            # REQUIRED
nephots                        = 201
# dephot                       = 0.001

# REQUIRED for integrated = F
# ephot                        = 0.530            # REQUIRED

# ------------------------------
# Angular/orientation sampling
# ------------------------------
# Uncomment if needed.
# dtheta                       = 25.0
# max-angle                    = 6000.0
angle-mode                     = 'random'
norientations                  = 32

# REQUIRED for angle-mode='file'
# angle-file                   = '/absolute/path/to/orientations.txt'
# axes-convention              = 'ddscat'

# ------------------------------
# Optional performance/output knobs
# ------------------------------
# nthreads                     = -1
# output-sigfigs               = 8
# quiet                        = F
# timing                       = F
# force-numerical              = F
# fftw-optimization            = 'estimate'
# use-padded-fft               = F

# ------------------------------
# Optional 2D/phi-averaged controls
# ------------------------------
# do-full-2d-fft               = T
# do-phi-averaging             = T
# nphi                         = 180
# nscatter                     = 401

# ------------------------------
# Optional unit overrides
# ------------------------------
# units-file                   = '/absolute/path/to/units.txt'
# input-unit-length            = 'micron'
# input-unit-angle             = 'arcsecond'
# input-unit-energy            = 'keV'
# output-unit-length           = 'micron'
# output-unit-angle            = 'arcsecond'
# output-unit-energy           = 'keV'

# ------------------------------
# Optional file outputs
# ------------------------------
# save-shadow-function         = T
# save-file-root               = 'my_run'
# save-orientations            = T
