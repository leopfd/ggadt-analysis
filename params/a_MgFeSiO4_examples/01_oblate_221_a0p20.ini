# Section 3 style example: oblate spheroid
grain-geometry                 = 'ellipsoid'
verbose                        = F
use-efficiencies               = T
integrated                     = T
do-full-2d-fft                 = F

# shape / size
aeff                           = 0.2
ngrain                         = 256
grain-axis-x                   = 2.0
grain-axis-y                   = 2.0
grain-axis-z                   = 1.0
agglom-file                    = ''

# optical constants (from generated material table)
material-file                  = '/Users/leo/Documents/MIT/Dust/ggadt-analysis/params/a_MgFeSiO4_examples/a_MgFeSiO4_material.dat'
ephot-min                      = 0.4
ephot-max                      = 0.562
nephots                        = 201

# units
input-unit-length              = 'micron'
input-unit-angle               = 'arcsecond'
input-unit-energy              = 'keV'
output-unit-length             = 'micron'
output-unit-angle              = 'arcsecond'
output-unit-energy             = 'keV'

# angular sampling
angle-mode                     = 'random'
norientations                  = 64
